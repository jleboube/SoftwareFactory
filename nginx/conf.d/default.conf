# OpenClaw gateway upstream (internal network only)
upstream openclaw_gateway {
    server openclaw:18789;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;

    # Security headers on all responses
    include /etc/nginx/snippets/security-headers.conf;

    # Health check endpoint (no auth, no rate limit)
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy","service":"software-factory","timestamp":"$time_iso8601"}';
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # WebSocket endpoint for OpenClaw gateway
    location /ws {
        limit_req zone=ws burst=5 nodelay;

        include /etc/nginx/snippets/proxy-params.conf;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeouts for persistent connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_pass http://openclaw_gateway;
    }

    # API and general proxy
    location / {
        limit_req zone=api burst=20 nodelay;

        include /etc/nginx/snippets/proxy-params.conf;

        proxy_pass http://openclaw_gateway;
    }
}

