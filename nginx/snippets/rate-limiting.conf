# Rate limiting zones

# General API: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# WebSocket connections: 2 new connections/second per IP
limit_req_zone $binary_remote_addr zone=ws:10m rate=2r/s;

# Authentication: 3 attempts/minute per IP
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;

limit_req_status 429;
